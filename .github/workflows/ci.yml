name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same PR/branch when a new commit is pushed.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────────────────────────
  # Backend — ruff lint + import / startup smoke
  # ──────────────────────────────────────────────────────────────────
  backend:
    name: Backend (Python 3.11)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff

      - name: Lint with ruff
        run: |
          ruff check . --select=E9,F63,F7,F82 --output-format=github
        # First pass blocks ONLY syntax errors / undefined names. Style
        # warnings are surfaced but non-blocking until we lock in a style.

      - name: Verify backend imports + router registration
        env:
          MONGO_URL: mongodb://localhost:27017
          ENV: DEV
          JWT_SECRET: ci_test_secret
          EMERGENT_LLM_KEY: ci_dummy_key
        run: |
          python -c "
          import sys
          sys.path.insert(0, '.')
          # Import-only smoke — fails CI if any router has a load-time bug
          # like the FastAPI Optional[Request] regression we caught in
          # session 34.
          from server import app
          routes = [r.path for r in app.routes if hasattr(r, 'path')]
          print(f'OK: app loaded with {len(routes)} routes')
          # Sanity-check a few critical routes are actually registered
          required = ['/api/', '/api/auth/login', '/api/creative-plan',
                     '/api/credits-info', '/api/mh-models', '/api/usage',
                     '/api/cinematic-presets', '/api/voices',
                     '/api/preview-voice']
          missing = [r for r in required if r not in routes]
          if missing:
              raise SystemExit(f'MISSING ROUTES: {missing}')
          print('OK: all critical routes registered')
          "

  # ──────────────────────────────────────────────────────────────────
  # Frontend — TS typecheck + Expo bundle smoke
  # ──────────────────────────────────────────────────────────────────
  frontend:
    name: Frontend (Expo SDK 53)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "yarn"
          cache-dependency-path: frontend/yarn.lock

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: TypeScript typecheck
        run: |
          if [ -f tsconfig.json ]; then
            yarn tsc --noEmit || echo "::warning::TypeScript errors present (non-blocking)"
          else
            echo "No tsconfig.json — skipping"
          fi

      # Optional: run ESLint if eslint config is present.
      - name: ESLint (if configured)
        run: |
          if [ -f .eslintrc.js ] || [ -f .eslintrc.json ] || [ -f eslint.config.js ]; then
            yarn lint || echo "::warning::ESLint reported issues (non-blocking)"
          else
            echo "No ESLint config — skipping"
          fi

  # ──────────────────────────────────────────────────────────────────
  # Status aggregator — single required check for branch protection.
  # ──────────────────────────────────────────────────────────────────
  ci-success:
    name: CI Success
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: always()
    steps:
      - name: Verify all jobs passed
        run: |
          if [ "${{ needs.backend.result }}" != "success" ] || \
             [ "${{ needs.frontend.result }}" != "success" ]; then
            echo "One or more required jobs failed"
            exit 1
          fi
          echo "All required jobs passed."
